plugins {
    id 'java'
    id 'org.springframework.boot' version '2.7.18'
    id 'io.spring.dependency-management' version '1.0.15.RELEASE'
}

group = 'io.pyroscope.example'
version = '1.0-SNAPSHOT'

sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Pyroscope Java agent used as a library to start profiling programmatically.
    // The OTel extension (pyroscope-otel.jar) is loaded separately via -javaagent flags
    // and discovers this running profiler via the system ClassLoader bridge.
    implementation 'io.pyroscope:agent:2.4.0'
}

bootJar {
    archiveFileName = 'app.jar'
}
