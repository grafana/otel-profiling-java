services:
  pyroscope:
    image: grafana/pyroscope:latest@sha256:0ad897bb457228c7d1133ce7004f83052e635be9daf4a7cc90364317637e9754
    ports:
      - "4040:4040"

  grafana:
    image: grafana/grafana:latest@sha256:b0ae311af06228bcfd4a620504b653db80f5b91e94dc3dc2a5b7dab202bcde20
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - pyroscope

  otel-extension-example:
    build:
      context: ..
      dockerfile: examples/with-otel-extension/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-extension-example
      PYROSCOPE_FORMAT: jfr
      OTEL_SERVICE_NAME: otel-extension-example
      OTEL_TRACES_EXPORTER: logging
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
    ports:
      - "8080:8080"
    depends_on:
      - pyroscope
    restart: on-failure

  otel-library-example:
    build:
      context: ..
      dockerfile: examples/with-otel-library/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-library-example
    ports:
      - "8081:8080"
    depends_on:
      - pyroscope
    restart: on-failure

  otel-extension-manual-start-example:
    build:
      context: ..
      dockerfile: examples/with-otel-extension-manual-start/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-extension-manual-start-example
      OTEL_SERVICE_NAME: otel-extension-manual-start-example
      OTEL_PYROSCOPE_START_PROFILING: "false"
      OTEL_TRACES_EXPORTER: logging
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_JAVAAGENT_DEBUG: "true"
    ports:
      - "8082:8080"
    depends_on:
      - pyroscope
    restart: on-failure
