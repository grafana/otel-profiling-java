services:
  pyroscope:
    image: grafana/pyroscope:latest@sha256:6e8084763afe8e362ff16342b5c019dfa00c6ca6e85ba2dce81af38b4c6afbb2
    ports:
      - "4040:4040"

  grafana:
    image: grafana/grafana:latest@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - pyroscope

  otel-extension-example:
    build:
      context: ..
      dockerfile: examples/with-otel-extension/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-extension-example
      PYROSCOPE_FORMAT: jfr
      OTEL_SERVICE_NAME: otel-extension-example
      OTEL_TRACES_EXPORTER: logging
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
    ports:
      - "8080:8080"
    depends_on:
      - pyroscope
    restart: on-failure

  otel-library-example:
    build:
      context: ..
      dockerfile: examples/with-otel-library/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-library-example
    ports:
      - "8081:8080"
    depends_on:
      - pyroscope
    restart: on-failure

  otel-extension-manual-start-example:
    build:
      context: ..
      dockerfile: examples/with-otel-extension-manual-start/Dockerfile
    environment:
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: otel-extension-manual-start-example
      OTEL_SERVICE_NAME: otel-extension-manual-start-example
      OTEL_PYROSCOPE_START_PROFILING: "false"
      OTEL_TRACES_EXPORTER: logging
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_JAVAAGENT_DEBUG: "true"
    ports:
      - "8082:8080"
    depends_on:
      - pyroscope
    restart: on-failure
