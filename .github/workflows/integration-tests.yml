name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'itest/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'itest/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/integration-tests.yml'

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-x64-small
    strategy:
      fail-fast: false
      matrix:
        target:
          - itest-otel-extension
          - itest-otel-library
          - itest-otel-extension-manual-start
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum

      # TODO: Remove once bootstrap-api is published to Maven Central
      - name: Clone and publish pyroscope-java bootstrap-api to mavenLocal
        run: |
          git clone --depth 1 --branch vk/5c8d-merge-squash-the \
            https://github.com/korniltsev-grafanista-yolo-vibecoder239/pyroscope-java.git /tmp/pyroscope-java
          cd /tmp/pyroscope-java
          ./gradlew :bootstrap-api:publishToMavenLocal :agent:publishToMavenLocal -x javadoc -x sign

      - name: Run ${{ matrix.target }}
        run: make ${{ matrix.target }}
        env:
          ORG_GRADLE_PROJECT_useMavenLocal: true
