name: Build Examples

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/examples.yml'

permissions:
  contents: read

jobs:
  build-examples:
    runs-on: ubuntu-x64-small
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build otel-extension example Docker image
        run: |
          docker build \
            -f examples/with-otel-extension/Dockerfile \
            -t otel-extension-example:ci \
            .

      - name: Build otel-library example Docker image
        run: |
          docker build \
            -f examples/with-otel-library/Dockerfile \
            -t otel-library-example:ci \
            .

      - name: Build otel-extension-manual-start example Docker image
        run: |
          docker build \
            -f examples/with-otel-extension-manual-start/Dockerfile \
            -t otel-extension-manual-start-example:ci \
            .
