name: Build Examples

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'otel-extension/**'
      - 'lib/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/examples.yml'

permissions:
  contents: read

jobs:
  build-examples:
    runs-on: ubuntu-x64-small
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Build both jars first - required by the example Dockerfiles.
      # TODO: Remove this step once pyroscope-otel is published to Maven Central.
      # - otel-extension/build/libs/pyroscope-otel.jar      (shadow jar) used by the otel-extension and otel-extension-manual-start examples
      # - lib/build/libs/pyroscope-otel-lib.jar             (thin jar)   used by the otel-library example
      - name: Build pyroscope-otel jars
        run: ./gradlew :otel-extension:shadowJar :lib:jar --no-daemon

      - name: Build otel-extension example Docker image
        run: |
          docker build \
            -f examples/with-otel-extension/Dockerfile \
            -t otel-extension-example:ci \
            .

      - name: Build otel-library example Docker image
        run: |
          docker build \
            -f examples/with-otel-library/Dockerfile \
            -t otel-library-example:ci \
            .

      - name: Build otel-extension-manual-start example Docker image
        run: |
          docker build \
            -f examples/with-otel-extension-manual-start/Dockerfile \
            -t otel-extension-manual-start-example:ci \
            .
